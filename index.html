<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>ENERGYO Bietfahrplan · 06.05.2026</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.14);--tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;--teal:#4db8a0;--tealb:rgba(77,184,160,0.12);--tealbr:rgba(77,184,160,0.3);--amb:#f0a500;--ambb:rgba(240,165,0,0.12);--ambbr:rgba(240,165,0,0.3);--blu:#58a6ff;--blub:rgba(88,166,255,0.1);--red:#f85149;--redb:rgba(248,81,73,0.1);--redbr:rgba(248,81,73,0.3);--grn:#3fb950;--grnb:rgba(63,185,80,0.1);--pur:#a371f7;--purb:rgba(163,113,247,0.1);--purbr:rgba(163,113,247,0.3);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--tx);padding-bottom:env(safe-area-inset-bottom,30px);}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--brd);padding:14px 16px 10px;position:sticky;top:0;z-index:100;}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.logo{background:#0d1b2a;color:var(--teal);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;letter-spacing:.05em;border:1px solid var(--tealbr);}
.htitle{font-size:14px;font-weight:700;color:var(--tx);margin-left:8px;}
.budg{font-size:12px;font-weight:700;color:var(--teal);background:var(--tealb);border:1px solid var(--tealbr);padding:4px 10px;border-radius:20px;}
.hmeta{font-size:11px;color:var(--tx3);margin-bottom:10px;line-height:1.5;}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.filters::-webkit-scrollbar{display:none;}
.fb{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;border:1px solid var(--brd2);background:transparent;color:var(--tx2);cursor:pointer;white-space:nowrap;-webkit-appearance:none;touch-action:manipulation;}
.fb.on{background:var(--teal);color:#0d1117;border-color:var(--teal);}

/* STATS */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--brd);border-bottom:1px solid var(--brd);}
.sc{background:var(--bg);padding:10px 6px;text-align:center;}
.sv{font-size:13px;font-weight:700;color:var(--tx);line-height:1;margin-bottom:3px;}
.sl{font-size:9px;color:var(--tx3);line-height:1.3;}

/* LEGEND */
.leg{display:flex;gap:12px;padding:9px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--brd);}
.leg::-webkit-scrollbar{display:none;}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx3);white-space:nowrap;}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* CARDS */
.cards{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;overflow:hidden;}
.p1{border-left:3px solid var(--teal);}
.p2{border-left:3px solid var(--amb);}
.p3{border-left:3px solid var(--blu);}
.px{border-left:3px solid var(--red);}

/* CARD HEAD */
.ch{padding:13px 14px 10px;cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.r1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.lotnr{font-size:10px;color:var(--tx3);margin-bottom:2px;}
.cn{font-size:15px;font-weight:700;color:var(--tx);line-height:1.3;margin-bottom:2px;}
.cs{font-size:11px;color:var(--tx2);line-height:1.4;}
.pr{text-align:right;flex-shrink:0;}
.plbl{font-size:10px;color:var(--tx3);margin-bottom:2px;}
.pm{font-size:17px;font-weight:700;color:var(--tx);white-space:nowrap;}
.psave{font-size:11px;font-weight:600;color:var(--teal);margin-top:1px;}
.psave.w{color:var(--amb);}
.row2{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.bdgs{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.b{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.bg{background:var(--grnb);color:var(--grn);border:1px solid rgba(63,185,80,0.25);}
.ba{background:var(--ambb);color:var(--amb);border:1px solid var(--ambbr);}
.bb{background:var(--blub);color:var(--blu);border:1px solid rgba(88,166,255,0.25);}
.br{background:var(--redb);color:var(--red);border:1px solid var(--redbr);}
.bgr{background:rgba(255,255,255,0.05);color:var(--tx2);border:1px solid var(--brd2);}
.bp{background:var(--purb);color:var(--pur);border:1px solid var(--purbr);}

/* DEAL SCORE PILL */
.score-pill{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.score-ring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid;}
.score-ring.s-top{border-color:var(--teal);color:var(--teal);}
.score-ring.s-gut{border-color:var(--amb);color:var(--amb);}
.score-ring.s-ok{border-color:var(--blu);color:var(--blu);}
.score-ring.s-nein{border-color:var(--red);color:var(--red);}
.chv{font-size:12px;color:var(--tx3);transition:transform .25s;display:block;text-align:right;margin-top:3px;}
.chv.o{transform:rotate(180deg);}

/* CARD BODY */
.cb{display:none;border-top:1px solid var(--brd);}
.cb.o{display:block;}

/* PRICE BARS */
.pbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px 0;}
.pb{background:var(--bg3);border-radius:8px;padding:9px 10px 7px;}
.pbl{font-size:9px;color:var(--tx3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.pbv{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:5px;}
.pbv.g{color:var(--teal);}
.pbv.a{color:var(--amb);}
.trk{height:3px;border-radius:2px;background:var(--brd2);overflow:hidden;}
.fil{height:100%;border-radius:2px;}
.sbox{margin:10px 14px 0;border-radius:8px;padding:9px 12px;font-size:12px;line-height:1.5;background:var(--tealb);border:1px solid var(--tealbr);color:var(--teal);}
.sbox.w{background:var(--ambb);border-color:var(--ambbr);color:var(--amb);}
.sbox strong{font-weight:700;}

/* SCORE BREAKDOWN */
.score-detail{margin:10px 14px 0;background:var(--bg3);border-radius:8px;padding:11px 12px;}
.score-detail h4{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.score-rows{display:flex;flex-direction:column;gap:5px;}
.sr{display:flex;align-items:center;gap:8px;}
.sr-lbl{font-size:11px;color:var(--tx2);flex:1;}
.sr-bar{flex:2;height:5px;background:var(--brd2);border-radius:3px;overflow:hidden;}
.sr-fill{height:100%;border-radius:3px;background:var(--teal);}
.sr-pts{font-size:11px;font-weight:700;color:var(--tx);width:30px;text-align:right;}
.score-total{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--brd);}
.score-total span{font-size:11px;color:var(--tx3);}
.score-total strong{font-size:16px;font-weight:700;}

/* TABS */
.tabs{display:flex;gap:0;margin:10px 14px 0;border-radius:8px;overflow:hidden;border:1px solid var(--brd2);}
.tab{flex:1;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:11px;font-weight:600;padding:7px 4px;border:none;background:transparent;color:var(--tx3);cursor:pointer;-webkit-appearance:none;transition:all .15s;touch-action:manipulation;}
.tab.on{background:var(--bg3);color:var(--tx);}

/* TAB PANELS */
.panel{display:none;padding:10px 14px 14px;}
.panel.on{display:block;}

/* WARUM */
.why-box{background:var(--bg3);border-radius:8px;padding:11px 12px;font-size:13px;color:var(--tx2);line-height:1.6;}

/* CHECKLISTE */
.cl{list-style:none;}
.cl li{font-size:13px;color:var(--tx2);padding:9px 0 9px 26px;position:relative;line-height:1.4;border-bottom:1px solid var(--brd);cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.cl li:last-child{border-bottom:none;}
.cl li:before{content:"";position:absolute;left:0;top:13px;width:10px;height:10px;border-radius:50%;border:2px solid var(--teal);}
.cl li.done{color:var(--tx3);text-decoration:line-through;}
.cl li.done:before{background:var(--grn);border-color:var(--grn);}
.cl-sub{font-size:10px;color:var(--tx3);display:block;margin-top:2px;}
.cl-sub.r{color:var(--red);}
.cl-sub.a{color:var(--amb);}
.cl-sub.g{color:var(--grn);}

/* VERHANDLUNG */
.verh-intro{background:var(--purb);border:1px solid var(--purbr);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:12px;color:var(--pur);line-height:1.5;}
.verh-intro strong{font-weight:700;display:block;margin-bottom:2px;}
.args{list-style:none;}
.args li{font-size:13px;color:var(--tx2);padding:8px 0 8px 18px;position:relative;line-height:1.4;border-bottom:1px solid var(--brd);}
.args li:last-child{border-bottom:none;}
.args li:before{content:"";position:absolute;left:0;top:14px;width:6px;height:6px;border-radius:50%;background:var(--pur);opacity:.8;}

/* STRATEGIE PAGE */
.strat{padding:12px 16px;}
.strat-sec{margin-bottom:20px;}
.strat-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--brd);}
.strat-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:13px 14px;margin-bottom:8px;}
.strat-card h3{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:5px;}
.strat-card p{font-size:12px;color:var(--tx2);line-height:1.6;}
.strat-card.tl{border-left:3px solid var(--teal);}
.strat-card.am{border-left:3px solid var(--amb);}
.strat-card.rd{border-left:3px solid var(--red);}
.strat-card.pu{border-left:3px solid var(--pur);}
.mono{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',monospace;font-size:12px;background:var(--bg3);padding:8px 10px;border-radius:7px;margin-top:7px;color:var(--tx);line-height:1.7;}
.score-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}
.score-table th{font-size:10px;font-weight:600;color:var(--tx3);text-align:left;padding:5px 6px;border-bottom:1px solid var(--brd);}
.score-table td{padding:6px 6px;border-bottom:1px solid var(--brd);color:var(--tx2);vertical-align:top;line-height:1.4;}
.score-table tr:last-child td{border-bottom:none;}
.strat-alert{background:var(--tealb);border:1px solid var(--tealbr);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.strat-alert h4{font-size:12px;font-weight:700;color:var(--teal);margin-bottom:3px;}
.strat-alert p{font-size:12px;color:var(--teal);line-height:1.5;}
.budget-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.bcard{background:var(--bg3);border-radius:8px;padding:10px;text-align:center;}
.bcard .bv{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.bcard .bl{font-size:10px;color:var(--tx3);line-height:1.4;}

/* MASSSTABE PAGE */
.mass{padding:12px 16px;}
.mass-card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.mass-head{padding:11px 14px;background:var(--bg3);border-bottom:1px solid var(--brd);font-size:12px;font-weight:700;color:var(--tx);}
.mass-body{padding:2px 0;}
.mrow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 14px;border-bottom:1px solid var(--brd);gap:10px;}
.mrow:last-child{border-bottom:none;}
.mlbl{font-size:12px;color:var(--tx2);flex:1.2;line-height:1.4;}
.mval{font-size:12px;font-weight:500;text-align:right;flex:1;line-height:1.4;}
.mval.g{color:var(--grn);}
.mval.a{color:var(--amb);}
.mval.r{color:var(--red);}

.foot{padding:16px 16px 8px;font-size:11px;color:var(--tx3);line-height:1.7;text-align:center;}
</style>
</head>

function fe(n){return n.toLocaleString('de-DE')+'\u202f\u20ac';}
function pct(v,m){return Math.min(100,Math.round(v/m*100));}

function calcScore(d){
  var s=d.sc;
  return s.marge+s.tech+s.km+s.jg+s.pap;
}

function scoreClass(s){
  if(s>=80) return 's-top';
  if(s>=65) return 's-gut';
  if(s>=50) return 's-ok';
  return 's-nein';
}

function scoreLbl(s){
  if(s>=80) return 'TOP';
  if(s>=65) return 'GUT';
  if(s>=50) return 'OK';
  return 'NEIN';
}

var af='all';

function bld(d){
  var sp=d.mk-d.ma,spP=Math.round(sp/d.mk*100),w=spP<20;
  var score=calcScore(d);
  var sc=scoreClass(score);
  var tg=d.t.map(function(t){var a=t.split('|');return'<span class="b '+a[0]+'">'+a[1]+'</span>';}).join('');
  var ck=d.c.map(function(c,i){
    return'<li onclick="this.classList.toggle(\'done\')">'
      +c.l
      +(c.m?'<span class="cl-sub '+c.cl+'">'+c.m+'</span>':'')
    +'</li>';
  }).join('');
  var vk=d.v?d.v.map(function(v){return'<li>'+v+'</li>';}).join(''):'';
  var scoreRows=''
    +'<div class="sr"><span class="sr-lbl">Ersparnis vs. Markt</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(d.sc.marge/30*100)+'%"></div></div><span class="sr-pts">'+d.sc.marge+'/30</span></div>'
    +'<div class="sr"><span class="sr-lbl">Technischer Zustand</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(d.sc.tech/25*100)+'%"></div></div><span class="sr-pts">'+d.sc.tech+'/25</span></div>'
    +'<div class="sr"><span class="sr-lbl">Kilometerstand</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(d.sc.km/20*100)+'%"></div></div><span class="sr-pts">'+d.sc.km+'/20</span></div>'
    +'<div class="sr"><span class="sr-lbl">Jahrgang</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(d.sc.jg/15*100)+'%"></div></div><span class="sr-pts">'+d.sc.jg+'/15</span></div>'
    +'<div class="sr"><span class="sr-lbl">Papiere vollstaendig</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(d.sc.pap/10*100)+'%"></div></div><span class="sr-pts">'+d.sc.pap+'/10</span></div>';
  var scoreColor=score>=80?'var(--teal)':score>=65?'var(--amb)':score>=50?'var(--blu)':'var(--red)';

  return'<div class="card '+d.pc+'" id="c'+d.nr+'">'
    +'<div class="ch" onclick="tog(this)">'
      +'<div class="r1">'
        +'<div><div class="lotnr">Los Nr.\u2009'+d.nr+'</div>'
        +'<div class="cn">'+d.n+'</div>'
        +'<div class="cs">'+d.s+'</div></div>'
        +'<div class="pr"><div class="plbl">Max.-Gebot</div>'
        +'<div class="pm">'+fe(d.ma)+'</div>'
        +'<div class="psave'+(w?' w':'')+'">'+fe(sp)+' unter Markt</div></div>'
      +'</div>'
      +'<div class="row2">'
        +'<div class="bdgs">'+tg+'</div>'
        +'<div class="score-pill"><div class="score-ring '+sc+'">'+score+'</div></div>'
      +'</div>'
      +'<span class="chv">&#9660;</span>'
    +'</div>'
    +'<div class="cb">'
      +'<div class="pbs">'
        +'<div class="pb"><div class="pbl">Mindestgebot</div><div class="pbv">'+fe(d.mi)+'</div><div class="trk"><div class="fil" style="width:'+pct(d.mi,d.mk)+'%;background:#58a6ff"></div></div></div>'
        +'<div class="pb"><div class="pbl">Max.-Gebot</div><div class="pbv a">'+fe(d.ma)+'</div><div class="trk"><div class="fil" style="width:'+pct(d.ma,d.mk)+'%;background:#f0a500"></div></div></div>'
        +'<div class="pb"><div class="pbl">Marktpreis</div><div class="pbv g">'+fe(d.mk)+'</div><div class="trk"><div class="fil" style="width:100%;background:#4db8a0"></div></div></div>'
      +'</div>'
      +'<div class="sbox'+(w?' w':'')+'">Bei Max.-Gebot <strong>'+spP+'% unter Haendlerpreis</strong> &mdash; Ersparnis <strong>'+fe(sp)+'</strong></div>'
      +'<div class="score-detail">'
        +'<h4>Deal-Score Aufschluesslung</h4>'
        +'<div class="score-rows">'+scoreRows+'</div>'
        +'<div class="score-total"><span>Gesamt-Score</span><strong style="color:'+scoreColor+'">'+score+' / 100</strong></div>'
      +'</div>'
      +'<div class="tabs">'
        +'<button class="tab on" onclick="switchTab(this,\'why'+d.nr+'\')">Warum</button>'
        +'<button class="tab" onclick="switchTab(this,\'check'+d.nr+'\')">Inspektion</button>'
        +'<button class="tab" onclick="switchTab(this,\'verh'+d.nr+'\')">Verhandlung</button>'
      +'</div>'
      +'<div class="panel on" id="why'+d.nr+'"><div class="why-box">'+d.w+'</div></div>'
      +'<div class="panel" id="check'+d.nr+'"><ul class="cl">'+ck+'</ul></div>'
      +'<div class="panel" id="verh'+d.nr+'">'
        +'<div class="verh-intro"><strong>Wenn ein anderer den Zuschlag bekommt:</strong>Direkt ansprechen. Sachlich, konkret, nicht aggressiv.</div>'
        +'<ul class="args">'+vk+'</ul>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function buildStrat(){
  return'<div class="strat">'
    +'<div class="strat-sec">'
      +'<div class="strat-title">Mindset: du gehst als Haendler, nicht als Kaeufer</div>'
      +'<div class="strat-alert"><h4>Das Ziel: 3 Autos kaufen, nicht 1 perfektes</h4><p>Mit 30k kaufst du Marge. Jedes Fahrzeug ist ein Posten. Ziel: 2-3 Kaeufe mit je 3-5k Marge. Wer auf das "beste" wartet verliert alle anderen.</p></div>'
      +'<div class="budget-row">'
        +'<div class="bcard"><div class="bv">10k</div><div class="bl">Tranche 1<br>Lose 1-45</div></div>'
        +'<div class="bcard"><div class="bv">12k</div><div class="bl">Tranche 2<br>Lose 46-75</div></div>'
        +'<div class="bcard"><div class="bv">8k</div><div class="bl">Tranche 3<br>Lose 76-93</div></div>'
      +'</div>'
    +'</div>'
    +'<div class="strat-sec">'
      +'<div class="strat-title">Deal-Score System</div>'
      +'<div class="strat-card tl"><h3>Wie der Score funktioniert</h3>'
        +'<table class="score-table">'
          +'<tr><th>Kriterium</th><th>Max.</th><th>Bewertung</th></tr>'
          +'<tr><td>Ersparnis vs. Markt</td><td>30</td><td>&gt;30% = 30 &middot; 20-30% = 20 &middot; 10-20% = 10</td></tr>'
          +'<tr><td>Technischer Zustand</td><td>25</td><td>Einwandfrei = 25 &middot; Kleinmaengel = 15 &middot; Grosse Maengel = 5</td></tr>'
          +'<tr><td>Kilometerstand</td><td>20</td><td>&lt;30k = 20 &middot; 30-60k = 18 &middot; 60-100k = 13 &middot; 100-150k = 8</td></tr>'
          +'<tr><td>Jahrgang</td><td>15</td><td>2023+ = 15 &middot; 2021-22 = 12 &middot; 2019-20 = 8 &middot; 2017-18 = 5</td></tr>'
          +'<tr><td>Papiere vollstaendig</td><td>10</td><td>Alles da = 10 &middot; Teil I fehlt = 3 &middot; Alles fehlt = 0</td></tr>'
        +'</table>'
        +'<div class="mono">Score 80-100 = Sofort bieten bis Max.<br>Score 65-79 = Bieten mit Spielraum<br>Score 50-64 = Nur wenn guenstig<br>Score unter 50 = Finger weg</div>'
      +'</div>'
    +'</div>'
    +'<div class="strat-sec">'
      +'<div class="strat-title">Biet-Reihenfolge vor Ort</div>'
      +'<div class="strat-card am"><h3>3-Sekunden-Entscheidungsregel</h3><p>Los wird aufgerufen. Score im Kopf: ueber 65 = mitbieten bis Tranchenbudget halb voll. Ueber 80 = voll rein bis Max.-Gebot. Unter 50 = Hand bleibt unten.</p></div>'
      +'<div class="strat-card tl"><h3>Verloren = Netzwerk aufbauen</h3><p>Direkt nach dem Zuschlag den Gewinner ansprechen: "Glueckwunsch, ich haette Interesse wenn du noch aehnliche Fahrzeuge findest." Visitenkarte geben.</p></div>'
      +'<div class="strat-card rd"><h3>Hartestes Limit einhalten</h3><p>Das Max.-Gebot ist ein Limit, kein Richtwert. Wer sein Limit bricht verliert Geld. Einmal drueber = Emotion hat gewonnen.</p></div>'
    +'</div>'
    +'<div class="strat-sec">'
      +'<div class="strat-title">Verhandlungs-Grundsaetze</div>'
      +'<div class="strat-card pu"><h3>8 Argumente fuer vor Ort</h3><ul class="args" style="margin-top:8px">'
        +TIPS.map(function(t){return'<li><strong style="color:var(--tx)">'+t.t+':</strong> '+t.d+'</li>';}).join('')
      +'</ul></div>'
    +'</div>'
  +'</div>';
}

function buildMass(){
  var h='<div class="mass">';
  for(var i=0;i<MASS.length;i++){
    var m=MASS[i];
    h+='<div class="mass-card"><div class="mass-head">'+m.titel+'</div><div class="mass-body">';
    for(var j=0;j<m.rows.length;j++){
      var r=m.rows[j];
      h+='<div class="mrow"><span class="mlbl">'+r.l+'</span><span class="mval '+r.cl+'">'+r.v+'</span></div>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

function tog(head){
  var cb=head.nextElementSibling;
  var chv=head.querySelector('.chv');
  cb.classList.toggle('o');
  chv.classList.toggle('o');
}

function switchTab(btn,panelId){
  var cb=btn.closest('.cb');
  var tabs=cb.querySelectorAll('.tab');
  var panels=cb.querySelectorAll('.panel');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  for(var i=0;i<panels.length;i++) panels[i].classList.remove('on');
  btn.classList.add('on');
  document.getElementById(panelId).classList.add('on');
}

function doFilter(val,btn){
  af=val;
  var all=document.querySelectorAll('.fb');
  for(var i=0;i<all.length;i++) all[i].classList.remove('on');
  btn.classList.add('on');
  render();
}

function render(){
  var main=document.getElementById('main');
  var foot=document.getElementById('foot');
  foot.style.display='block';

  if(af==='strat'){
    main.innerHTML=buildStrat();
    document.getElementById('sb').innerHTML=
      '<div class="sc"><div class="sv">3</div><div class="sl">Ziel-Kaeufe</div></div>'
     +'<div class="sc"><div class="sv" style="color:var(--teal)">15k</div><div class="sl">Ziel-Gewinn</div></div>'
     +'<div class="sc"><div class="sv">30 Tage</div><div class="sl">Verkaufsziel</div></div>'
     +'<div class="sc"><div class="sv" style="color:var(--pur)">Score&gt;65</div><div class="sl">Bietgrenze</div></div>';
    foot.style.display='none';
    return;
  }
  if(af==='mass'){
    main.innerHTML=buildMass();
    document.getElementById('sb').innerHTML=
      '<div class="sc"><div class="sv">6</div><div class="sl">Bereiche</div></div>'
     +'<div class="sc"><div class="sv" style="color:var(--grn)">4mm</div><div class="sl">Reifen Mind.</div></div>'
     +'<div class="sc"><div class="sv" style="color:var(--red)">Milchig</div><div class="sl">Oel = Ausschluss</div></div>'
     +'<div class="sc"><div class="sv" style="color:var(--red)">MKL an</div><div class="sl">= Ausschluss</div></div>';
    foot.style.display='none';
    return;
  }

  var list=af==='all'?D:D.filter(function(d){return d.p===af;});
  var h='<div class="cards">';
  for(var i=0;i<list.length;i++) h+=bld(list[i]);
  h+='</div>';
  main.innerHTML=h;

  var mas=list.map(function(d){return d.ma;});
  var sav=list.map(function(d){return d.mk-d.ma;});
  var avg=Math.round(sav.reduce(function(a,b){return a+b;},0)/sav.length);
  var scores=list.map(function(d){return calcScore(d);});
  var topCount=scores.filter(function(s){return s>=80;}).length;
  document.getElementById('sb').innerHTML=
    '<div class="sc"><div class="sv">'+list.length+'</div><div class="sl">Kandidaten</div></div>'
   +'<div class="sc"><div class="sv" style="color:var(--teal)">'+topCount+'</div><div class="sl">Score 80+</div></div>'
   +'<div class="sc"><div class="sv">'+fe(Math.min.apply(null,mas))+'</div><div class="sl">Niedrig. Max.</div></div>'
   +'<div class="sc"><div class="sv" style="color:var(--teal)">'+fe(avg)+'</div><div class="sl">Ersparnis</div></div>';
}

document.addEventListener('DOMContentLoaded',function(){render();});
</script>
